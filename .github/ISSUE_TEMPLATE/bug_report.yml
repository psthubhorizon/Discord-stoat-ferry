name: Bug Report
description: Something isn't working
labels: [bug]
body:
  - type: dropdown
    id: interface
    attributes:
      label: Which interface?
      options:
        - GUI (Ferry.exe / Ferry.app)
        - CLI (ferry command)
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Ferry version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: Tell us what you were doing and what went wrong
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error messages or logs
      description: Paste any error messages, or attach ferry-output/report.json
      render: shell
  - type: textarea
    id: export-info
    attributes:
      label: Export details
      description: "Approximate server size: channels, messages, attachments"
