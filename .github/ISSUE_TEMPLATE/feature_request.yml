name: Feature Request
description: Suggest an improvement or new feature
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: Describe the problem or use case
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      placeholder: Describe your ideal solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      placeholder: Any workarounds or other approaches you've thought about
  - type: dropdown
    id: area
    attributes:
      label: Which area?
      options:
        - GUI
        - CLI
        - Migration engine
        - Documentation
        - Packaging / installation
        - Other
    validations:
      required: true
