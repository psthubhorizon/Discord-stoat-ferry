  <text x="300" y="130" font-family="system-ui, -apple-system, sans-serif"
        font-size="36" font-weight="700" fill="#1e293b" text-anchor="middle">Ferry</text>
  <text x="300" y="152" font-family="system-ui, -apple-system, sans-serif"
