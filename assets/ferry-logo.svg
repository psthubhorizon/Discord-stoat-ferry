<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="water" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <!-- Hull -->
  <path d="M60 130 L80 160 L240 160 L260 130 Z" fill="#1e293b"/>
  <!-- Cabin -->
  <rect x="100" y="95" width="120" height="35" rx="4" fill="#334155"/>
