  <!-- Smoke puff -->
  <circle cx="200" cy="55" r="8" fill="#94a3b8" opacity="0.5"/>
  <circle cx="210" cy="45" r="6" fill="#94a3b8" opacity="0.3"/>
  <!-- Waves -->
  <path d="M30 155 Q70 145 110 155 Q150 165 190 155 Q230 145 270 155 Q310 165 350 155"
