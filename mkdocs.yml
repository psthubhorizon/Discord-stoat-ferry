site_name: Discord Ferry
site_description: Migrate Discord servers to Stoat (formerly Revolt)
repo_url: https://github.com/psthubhorizon/Discord-stoat-ferry
repo_name: psthubhorizon/Discord-stoat-ferry
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.expand
    - search.suggest
    - content.code.copy
exclude_docs: |
  plans/
  discord-ferry-claude-code-brief.md
nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/install.md
    - Exporting from Discord: getting-started/export-discord.md
    - Setting up Stoat: getting-started/setup-stoat.md
    - Your First Migration: getting-started/first-migration.md
  - Guides:
    - GUI Walkthrough: guides/gui-walkthrough.md
    - CLI Reference: guides/cli-reference.md
    - Large Servers: guides/large-servers.md
    - Self-Hosted Tips: guides/self-hosted-tips.md
    - Timestamp Preservation: guides/timestamps.md
    - Known Limitations: guides/known-limitations.md
    - Pre-Flight Checklist: guides/pre-flight-checklist.md
    - Troubleshooting: guides/troubleshooting.md
  - Reference:
    - Architecture: reference/architecture.md
    - Stoat API Notes: reference/stoat-api-notes.md
    - DCE Format: reference/dce-format.md
  - Contributing: contributing.md
  - Changelog: changelog.md
